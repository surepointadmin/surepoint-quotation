<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SurePoint 견적서</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root {
    --sp-blue: #2B5BFF;
    --sp-dark: #0A0F1E;
    --sp-gray: #6B7280;
    --sp-light: #F8FAFF;
    --sp-border: #E5E9F0;
    --sp-accent: #1A3BCC;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans KR', sans-serif; background: #F0F3FB; color: var(--sp-dark); min-height: 100vh; }

  .editor-shell { max-width: 1100px; margin: 0 auto; padding: 32px 20px 80px; }
  .editor-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 12px; }
  .editor-title { font-size: 22px; font-weight: 700; color: var(--sp-dark); display: flex; align-items: center; gap: 10px; }
  .editor-title span { background: var(--sp-blue); color: #fff; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 4px; letter-spacing: .5px; }
  .btn-group { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 11px 22px; border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px; font-weight: 600;
    cursor: pointer; border: none; transition: all .18s; white-space: nowrap;
  }
  .btn-primary { background: var(--sp-blue); color: #fff; }
  .btn-primary:hover { background: var(--sp-accent); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(43,91,255,.35); }
  .btn-outline { background: #fff; color: var(--sp-blue); border: 1.5px solid var(--sp-blue); }
  .btn-outline:hover { background: var(--sp-light); transform: translateY(-1px); }
  .btn-green { background: #10B981; color: #fff; }
  .btn-green:hover { background: #059669; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(16,185,129,.35); }

  .section-card { background: #fff; border-radius: 14px; padding: 24px 28px; margin-bottom: 18px; border: 1px solid var(--sp-border); box-shadow: 0 1px 4px rgba(0,0,0,.04); }
  .section-label { font-size: 12px; font-weight: 700; color: var(--sp-blue); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--sp-border); }
  .form-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 14px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }
  label { font-size: 12px; font-weight: 600; color: var(--sp-gray); }

  input[type="text"], input[type="number"], input[type="date"], input[type="email"], textarea {
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px;
    padding: 9px 13px; border: 1.5px solid var(--sp-border); border-radius: 7px;
    color: var(--sp-dark); background: #FAFBFF;
    transition: border-color .15s, box-shadow .15s; outline: none;
  }
  input:focus, textarea:focus { border-color: var(--sp-blue); box-shadow: 0 0 0 3px rgba(43,91,255,.12); background: #fff; }
  textarea { resize: vertical; min-height: 100px; width: 100%; }

  .item-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .item-table th { background: var(--sp-light); color: var(--sp-gray); font-weight: 700; font-size: 11px; letter-spacing: .5px; padding: 10px; text-align: center; border-bottom: 2px solid var(--sp-border); }
  .item-table td { padding: 6px; border-bottom: 1px solid #F0F3F8; vertical-align: middle; }
  .item-table input { width: 100%; padding: 7px 8px; font-size: 13px; text-align: center; border: 1.5px solid transparent; border-radius: 5px; background: transparent; font-family: 'Noto Sans KR', sans-serif; }
  .item-table input:hover { border-color: var(--sp-border); background: #FAFBFF; }
  .item-table input:focus { border-color: var(--sp-blue); background: #fff; outline: none; }
  .item-table input.left { text-align: left; }

  .btn-del-row { background: #FEF2F2; color: #EF4444; border: none; border-radius: 5px; width: 28px; height: 28px; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; }
  .btn-del-row:hover { background: #FEE2E2; }
  .btn-add-row { margin-top: 10px; background: none; border: 1.5px dashed var(--sp-border); color: var(--sp-gray); border-radius: 7px; padding: 8px 16px; font-size: 13px; cursor: pointer; width: 100%; font-family: 'Noto Sans KR', sans-serif; transition: all .15s; }
  .btn-add-row:hover { border-color: var(--sp-blue); color: var(--sp-blue); background: var(--sp-light); }

  .totals-box { margin-top: 14px; display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }
  .total-row { display: flex; gap: 20px; font-size: 14px; color: var(--sp-gray); min-width: 280px; justify-content: space-between; }
  .total-row.grand { font-size: 16px; font-weight: 700; color: var(--sp-dark); padding-top: 10px; border-top: 2px solid var(--sp-dark); margin-top: 4px; }

  /* 미리보기 모달 */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 1000; justify-content: center; align-items: flex-start; overflow-y: auto; padding: 32px 16px; }
  .modal-overlay.open { display: flex; }
  .modal-box { background: #fff; border-radius: 16px; width: 100%; max-width: 820px; margin: auto; box-shadow: 0 24px 64px rgba(0,0,0,.3); overflow: hidden; }
  .modal-head { padding: 18px 28px; border-bottom: 1px solid var(--sp-border); display: flex; justify-content: space-between; align-items: center; }
  .modal-head-title { font-size: 16px; font-weight: 700; }
  .modal-close { background: none; border: none; font-size: 26px; cursor: pointer; color: var(--sp-gray); line-height: 1; padding: 0 4px; }
  .modal-body { padding: 24px; background: #DDE3EE; overflow-x: auto; }
  .modal-foot { padding: 16px 28px; border-top: 1px solid var(--sp-border); display: flex; justify-content: flex-end; gap: 10px; }
  #preview-wrap { display: flex; justify-content: center; }
  #preview-wrap canvas { box-shadow: 0 4px 24px rgba(0,0,0,.2); border-radius: 3px; max-width: 100%; display: block; }

  .toast { position: fixed; bottom: 28px; right: 28px; background: #0A0F1E; color: #fff; padding: 14px 22px; border-radius: 10px; font-size: 14px; font-weight: 500; box-shadow: 0 8px 24px rgba(0,0,0,.25); z-index: 9999; opacity: 0; transform: translateY(12px); transition: all .3s; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast.success { background: #10B981; }
  .toast.error { background: #EF4444; }

  /* ── 탭 ── */
  .tab-bar { display:flex; gap:0; margin-bottom:28px; border-bottom:2px solid var(--sp-border); }
  .tab-btn { padding:12px 24px; font-family:'Noto Sans KR',sans-serif; font-size:14px; font-weight:600; background:none; border:none; cursor:pointer; color:var(--sp-gray); border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .15s; }
  .tab-btn.active { color:var(--sp-blue); border-bottom-color:var(--sp-blue); }
  .tab-btn:hover:not(.active) { color:var(--sp-dark); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* ── 기록 테이블 ── */
  .hist-table { width:100%; border-collapse:collapse; font-size:13px; }
  .hist-table th { background:var(--sp-light); color:var(--sp-gray); font-weight:700; font-size:11px; letter-spacing:.4px; padding:10px 12px; text-align:left; border-bottom:2px solid var(--sp-border); }
  .hist-table td { padding:11px 12px; border-bottom:1px solid #F0F3F8; vertical-align:middle; color:var(--sp-dark); }
  .hist-table tr:hover td { background:#F8FAFF; }
  .hist-empty { text-align:center; padding:48px; color:var(--sp-gray); font-size:14px; }
  .badge-total { font-weight:700; color:var(--sp-blue); }
  .hist-refresh { margin-left:auto; }


  /* ── PDF 뷰어 모달 ── */
  .pdf-viewer-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.75); z-index:200; justify-content:center; align-items:flex-start; overflow-y:auto; padding:24px 16px; }
  .pdf-viewer-overlay.open { display:flex; }
  .pdf-viewer-box { background:#fff; border-radius:14px; width:100%; max-width:860px; margin:auto; overflow:hidden; box-shadow:0 32px 80px rgba(0,0,0,.4); }
  .pdf-viewer-head { padding:16px 24px; border-bottom:1px solid var(--sp-border); display:flex; justify-content:space-between; align-items:center; gap:12px; }
  .pdf-viewer-head h2 { font-size:15px; font-weight:700; flex:1; }
  .pdf-viewer-body { background:#525659; padding:0; display:flex; justify-content:center; min-height:600px; }
  .pdf-viewer-body iframe { width:100%; min-height:80vh; border:none; }
  .pdf-viewer-foot { padding:14px 24px; border-top:1px solid var(--sp-border); display:flex; justify-content:flex-end; gap:10px; }


  /* ── 검색 필터 ── */
  .search-bar {
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(180px,1fr));
    gap:10px;
    padding:16px 0 18px;
    border-bottom:1px solid var(--sp-border);
    margin-bottom:16px;
  }
  .search-bar input, .search-bar select {
    font-family:'Noto Sans KR',sans-serif;
    font-size:13px; padding:8px 11px;
    border:1.5px solid var(--sp-border); border-radius:7px;
    color:var(--sp-dark); background:#FAFBFF; outline:none;
    transition:border-color .13s;
  }
  .search-bar input:focus, .search-bar select:focus {
    border-color:var(--sp-blue); background:#fff;
  }
  .search-actions { display:flex; gap:8px; align-items:center; grid-column:1/-1; }
  .search-count { font-size:12px; color:var(--sp-gray); margin-left:auto; }
  .highlight { background:#FEF9C3; border-radius:2px; padding:0 1px; }

</style>
</head>
<body>

<!-- 로고 img — 페이지 로드 시 미리 캐싱 (화면에는 안 보임) -->

<div class="editor-shell">
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('write')">✏️ 견적서 작성</button>
    <button class="tab-btn" onclick="switchTab('history')">📋 발행 기록</button>
  </div>
  <div id="tab-write" class="tab-panel active">
  <div class="editor-header">
    <div class="editor-title">견적서 작성 <span>SurePoint</span></div>
    <div class="btn-group">
      <button class="btn btn-outline" onclick="openPreview()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>미리보기
      </button>
      <button class="btn btn-primary" onclick="downloadPDF()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7,10 12,15 17,10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>PDF 저장
      </button>
    </div>
  </div>

  <div class="section-card">
    <div class="section-label">📋 문서 정보</div>
    <div class="form-grid">
      <div class="form-group"><label>문서번호</label><input type="text" id="docnum" value="SP-2026-001"></div>
      <div class="form-group"><label>작성일자</label><input type="date" id="date"></div>
      <div class="form-group"><label>견적 유효기간</label><input type="text" id="valid" value="발행일로부터 30일"></div>
      <div class="form-group"><label>담당 영업</label><input type="text" id="sales" placeholder="홍길동"></div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-label">🏢 고객사 정보</div>
    <div class="form-grid">
      <div class="form-group"><label>회사명 / 수신처</label><input type="text" id="client" placeholder="(주)고객사"></div>
      <div class="form-group"><label>담당자명</label><input type="text" id="contact" placeholder="김담당"></div>
      <div class="form-group"><label>연락처</label><input type="text" id="phone" placeholder="010-0000-0000"></div>
      <div class="form-group"><label>이메일</label><input type="email" id="cemail" placeholder="contact@company.com"></div>
      <div class="form-group full"><label>프로젝트 명</label><input type="text" id="project" placeholder="물류센터 AI 안전시스템 도입 건"></div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-label">📦 견적 품목</div>
    <div style="overflow-x:auto">
      <table class="item-table">
        <thead>
          <tr>
            <th style="width:4%">No.</th>
            <th style="width:22%;text-align:left;padding-left:10px">품명</th>
            <th style="width:18%;text-align:left;padding-left:10px">규격</th>
            <th style="width:8%">수량</th>
            <th style="width:7%">단위</th>
            <th style="width:13%">단가</th>
            <th style="width:13%">공급가</th>
            <th style="width:9%">비고</th>
            <th style="width:6%"></th>
          </tr>
        </thead>
        <tbody id="item-tbody"></tbody>
      </table>
    </div>
    <button class="btn-add-row" onclick="addRow()">+ 품목 추가</button>
    <div class="totals-box">
      <div class="total-row"><span>공급가액</span><span id="ui-subtotal">0 원</span></div>
      <div class="total-row"><span>부가세 (10%)</span><span id="ui-vat">0 원</span></div>
      <div class="total-row grand"><span>합계금액</span><span id="ui-total">0 원</span></div>
    </div>
  </div>

  <div class="section-card">
    <div class="section-label">📝 비고 / 특이사항</div>
    <textarea id="remark"></textarea>
  </div>
  <div class="section-card">
    <div class="section-label">🖼️ 이미지 설정</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:28px">
      <div>
        <div style="font-size:12px;font-weight:700;color:#0A0F1E;margin-bottom:12px">로고 이미지</div>
        <div style="display:flex;align-items:center;gap:14px">
          <div id="logo-preview" style="width:130px;height:50px;border:1.5px dashed #E5E9F0;border-radius:8px;background:#FAFBFF;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
            <span style="font-size:11px;color:#CBD5E1">로고 없음</span>
          </div>
          <div>
            <div style="font-size:12px;color:#6B7280;line-height:1.8"><strong style="display:block;color:#0A0F1E;margin-bottom:2px">로고 업로드</strong>PDF 상단 + 하단에 출력됩니다.</div>
            <input type="file" accept="image/*" style="margin-top:8px;font-size:12.5px" onchange="loadAsset('logo',this)">
          </div>
        </div>
      </div>
      <div>
        <div style="font-size:12px;font-weight:700;color:#0A0F1E;margin-bottom:12px">인감 이미지</div>
        <div style="display:flex;align-items:center;gap:14px">
          <div id="stamp-preview" style="width:64px;height:64px;border:1.5px dashed #E5E9F0;border-radius:50%;background:#FAFBFF;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0">
            <span style="font-size:11px;color:#CBD5E1;text-align:center;line-height:1.4">인감<br>없음</span>
          </div>
          <div>
            <div style="font-size:12px;color:#6B7280;line-height:1.8"><strong style="display:block;color:#0A0F1E;margin-bottom:2px">인감 업로드</strong>PDF 날인 영역에 삽입됩니다.</div>
            <input type="file" accept="image/*" style="margin-top:8px;font-size:12.5px" onchange="loadAsset('stamp',this)">
          </div>
        </div>
      </div>
    </div>
  </div>
  </div><!-- /tab-write -->

  <!-- 발행 기록 탭 -->
  <div id="tab-history" class="tab-panel">
    <div class="section-card">
      <div style="display:flex;align-items:center;margin-bottom:0;padding-bottom:14px;border-bottom:1px solid var(--sp-border)">
        <div class="section-label" style="margin:0">📋 PDF 발행 기록</div>
        <button class="btn btn-outline hist-refresh" onclick="loadHistory()" style="padding:7px 16px;font-size:12.5px;margin-left:auto">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>새로고침
        </button>
      </div>

      <!-- 검색 필터 -->
      <div class="search-bar">
        <input type="text"   id="s-docnum"  placeholder="🔍 문서번호"    oninput="applyFilter()">
        <input type="text"   id="s-client"  placeholder="🔍 고객사"       oninput="applyFilter()">
        <input type="text"   id="s-contact" placeholder="🔍 담당자"       oninput="applyFilter()">
        <input type="text"   id="s-sales"   placeholder="🔍 담당영업"     oninput="applyFilter()">
        <input type="text"   id="s-project" placeholder="🔍 프로젝트"     oninput="applyFilter()">
        <input type="date"   id="s-from"    title="시작일"                 onchange="applyFilter()">
        <input type="date"   id="s-to"      title="종료일"                 onchange="applyFilter()">
        <div class="search-actions">
          <button class="btn btn-outline" onclick="clearFilter()" style="padding:7px 14px;font-size:12.5px">초기화</button>
          <span class="search-count" id="s-count"></span>
        </div>
      </div>

      <div id="hist-content">
        <div class="hist-empty">불러오는 중...</div>
      </div>
    </div>
  </div>
</div>

<!-- 미리보기 모달 -->
<div class="modal-overlay" id="preview-modal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-head-title">견적서 미리보기</div>
      <button class="modal-close" onclick="closePreview()">×</button>
    </div>
    <div class="modal-body">
      <div id="preview-wrap"><canvas id="preview-canvas"></canvas></div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closePreview()">닫기</button>
      <button class="btn btn-primary" onclick="downloadPDF()">PDF 저장</button>
    </div>
  </div>
</div>

<!-- PDF 뷰어 모달 -->
<div class="pdf-viewer-overlay" id="pdf-viewer-modal">
  <div class="pdf-viewer-box">
    <div class="pdf-viewer-head">
      <h2 id="pdf-viewer-title">견적서</h2>
      <button id="pdf-newtab-btn" onclick="window.open(document.getElementById('pdf-viewer-frame').src,'_blank')" class="btn btn-outline" style="padding:8px 16px;font-size:13px">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>새 탭에서 열기
      </button>
      <a id="pdf-download-btn" href="#" download class="btn btn-primary" style="padding:8px 16px;font-size:13px;text-decoration:none">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>다운로드
      </a>
      <button class="modal-close" onclick="closePdfViewer()" style="font-size:26px;background:none;border:none;cursor:pointer;color:#6B7280;line-height:1;margin-left:4px">×</button>
    </div>
    <div class="pdf-viewer-body">
      <iframe id="pdf-viewer-frame" src="" style="width:100%;min-height:80vh;border:none"></iframe>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── 로고 src (페이지 로드 시 img 태그로 미리 캐싱됨) ──
// ── Supabase Storage 연동 ──
const SB_URL = 'https://yxmxrjcmhguczrgyxgfo.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl4bXhyamNtaGd1Y3pyZ3l4Z2ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzMTY5NDUsImV4cCI6MjA4OTg5Mjk0NX0.xAUk_0J_5vC9emVFooAJEFBRDq7mJP5QGhIcBav6fh8';
const SB_BUCKET = 'quotation-assets';

function sbStorageURL(filename) {
  return `${SB_URL}/storage/v1/object/public/${SB_BUCKET}/${filename}`;
}

async function sbUpload(filename, file) {
  // 기존 파일 삭제 후 재업로드
  await fetch(`${SB_URL}/storage/v1/object/${SB_BUCKET}/${filename}`, {
    method: 'DELETE',
    headers: { 'Authorization': `Bearer ${SB_KEY}` }
  });
  const res = await fetch(`${SB_URL}/storage/v1/object/${SB_BUCKET}/${filename}`, {
    method: 'POST',
    headers: {
      'Authorization': `Bearer ${SB_KEY}`,
      'Content-Type': file.type,
      'x-upsert': 'true',
    },
    body: file,
  });
  if (!res.ok) throw new Error('업로드 실패: ' + await res.text());
  return sbStorageURL(filename);
}

function addRow(data = {}) {
  rowIndex++;
  const idx = rowIndex;
  const tr = document.createElement('tr');
  tr.id = `row-${idx}`;
  tr.innerHTML = `
    <td style="text-align:center;color:#9CA3AF;font-size:12px">${idx}</td>
    <td><input class="left" type="text" placeholder="품명" value="${data.name||''}"></td>
    <td><input class="left" type="text" placeholder="규격" value="${data.spec||''}"></td>
    <td><input type="number" min="0" value="${data.qty||1}" oninput="calcRow(${idx})" id="qty-${idx}"></td>
    <td><input type="text" value="${data.unit||'EA'}"></td>
    <td><input type="number" min="0" value="${data.price||0}" oninput="calcRow(${idx})" id="price-${idx}"></td>
    <td><input type="number" readonly id="supply-${idx}" value="${(data.qty||1)*(data.price||0)}" style="color:#2B5BFF;font-weight:600;background:transparent"></td>
    <td><input type="text" value="${data.note||''}"></td>
    <td><button class="btn-del-row" onclick="delRow(${idx})">×</button></td>`;
  document.getElementById('item-tbody').appendChild(tr);
  calcTotals();
}

function delRow(idx) { document.getElementById(`row-${idx}`)?.remove(); calcTotals(); }

function calcRow(idx) {
  const qty = parseFloat(document.getElementById(`qty-${idx}`)?.value)||0;
  const price = parseFloat(document.getElementById(`price-${idx}`)?.value)||0;
  const s = document.getElementById(`supply-${idx}`);
  if (s) s.value = qty * price;
  calcTotals();
}

function calcTotals() {
  let sub = 0;
  document.querySelectorAll('[id^="supply-"]').forEach(el => sub += parseFloat(el.value)||0);
  const vat = Math.round(sub * 0.1);
  document.getElementById('ui-subtotal').textContent = fmt(sub) + ' 원';
  document.getElementById('ui-vat').textContent = fmt(vat) + ' 원';
  document.getElementById('ui-total').textContent = fmt(sub + vat) + ' 원';
}

function fmt(n) { return Math.round(n).toLocaleString('ko-KR'); }
function v(id) { return document.getElementById(id)?.value || ''; }

function collectData() {
  const rows = [];
  document.querySelectorAll('#item-tbody tr').forEach(tr => {
    const ins = tr.querySelectorAll('input');
    rows.push({
      name: ins[0].value, spec: ins[1].value,
      qty: parseFloat(ins[2].value)||0, unit: ins[3].value,
      price: parseFloat(ins[4].value)||0, supply: parseFloat(ins[5].value)||0,
      note: ins[6].value,
    });
  });
  const sub = rows.reduce((s, r) => s + r.supply, 0);
  const vat = Math.round(sub * 0.1);
  return {
    docnum: v('docnum'), date: v('date'), valid: v('valid'), sales: v('sales'),
    client: v('client'), contact: v('contact'), phone: v('phone'),
    email: v('cemail'), project: v('project'), remark: v('remark'),
    rows, sub, vat, total: sub + vat,
  };
}

// ── 공통 렌더 함수 ──
async function renderToCanvas() {
  const d = collectData();
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;left:0;top:0;z-index:-999;width:794px;background:#fff;overflow:hidden;';
  wrap.innerHTML = buildPDFHTML(d);
  document.body.appendChild(wrap);

  // 내부 img 로드 대기
  await Promise.all([...wrap.querySelectorAll('img')].map(img =>
    new Promise(res => {
      if (img.complete && img.naturalWidth > 0) return res();
      img.onload = res;
      img.onerror = res;
      setTimeout(res, 3000);
    })
  ));
  await document.fonts.ready;
  await new Promise(r => setTimeout(r, 150));

  try {
    return await html2canvas(wrap, {
      scale: 2, useCORS: true, allowTaint: true,
      backgroundColor: '#ffffff', width: 794, windowWidth: 794, logging: false,
    });
  } finally {
    document.body.removeChild(wrap);
  }
}

async function downloadPDF() {
  showToast('PDF 생성 중...', '');
  try {
    const canvas = await renderToCanvas();
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
    pdf.addImage(canvas.toDataURL('image/jpeg', 0.95), 'JPEG', 0, 0, 210, 297);
    const d = collectData();
    const filename = `SurePoint_견적서_${d.docnum||d.date}_${Date.now()}.pdf`;
    showToast('PDF 업로드 중...', '');
    // blob 먼저 추출 (save() 호출 전에 해야 함)
    let pdfPath = null;
    try {
      const pdfBlob = pdf.output('blob');
      pdfPath = await uploadPDF(pdfBlob, filename);
    } catch(e) { console.warn('PDF 클라우드 저장 실패:', e); }
    // 로컬 다운로드
    pdf.save(filename);
    // 발행 기록 저장
    await saveHistory({...d, pdfPath});
    await initDocnum();
    showToast('PDF 저장 완료! ✓', 'success');
  } catch(e) {
    showToast('오류: ' + e.message, 'error');
    console.error(e);
  }
}

async function openPreview() {
  showToast('미리보기 생성 중...', '');
  try {
    const canvas = await renderToCanvas();
    const pc = document.getElementById('preview-canvas');
    // 모달 너비에 맞게 스케일 조정
    const maxW = Math.min(window.innerWidth - 80, 760);
    const displayW = Math.min(maxW, canvas.width / 2);
    const displayH = canvas.height / 2 * (displayW / (canvas.width / 2));
    pc.width = canvas.width;
    pc.height = canvas.height;
    pc.style.width = displayW + 'px';
    pc.style.height = displayH + 'px';
    pc.getContext('2d').drawImage(canvas, 0, 0);
    document.getElementById('preview-modal').classList.add('open');
    showToast('', '');
  } catch(e) {
    showToast('미리보기 오류: ' + e.message, 'error');
    console.error(e);
  }
}

        total:     d.total,
        sub:       d.sub,
        vat:       d.vat,
        remark:    d.remark,
        rows_json: d.rows,
        pdf_path:  d.pdfPath || null,
      }),
    });
  } catch(e) { console.warn('기록 저장 실패:', e); }
}

// ── 검색 필터 적용 ──
function applyFilter() {
  const q = s => (document.getElementById(s)?.value || '').trim().toLowerCase();
  const docnum  = q('s-docnum');
  const client  = q('s-client');
  const contact = q('s-contact');
  const sales   = q('s-sales');
  const project = q('s-project');
  const fromVal = document.getElementById('s-from')?.value;
  const toVal   = document.getElementById('s-to')?.value;
  const from    = fromVal ? new Date(fromVal + 'T00:00:00') : null;
  const to      = toVal   ? new Date(toVal   + 'T23:59:59') : null;

  const filtered = _histAllData.filter(r => {
    const dt = new Date(r.created_at);
    return (
      (!docnum  || (r.docnum  ||'').toLowerCase().includes(docnum))  &&
      (!client  || (r.client  ||'').toLowerCase().includes(client))  &&
      (!contact || (r.contact ||'').toLowerCase().includes(contact)) &&
      (!sales   || (r.sales   ||'').toLowerCase().includes(sales))   &&
      (!project || (r.project ||'').toLowerCase().includes(project)) &&
      (!from    || dt >= from) &&
      (!to      || dt <= to)
    );
  });

  renderHistory(filtered);
}

function clearFilter() {
  ['s-docnum','s-client','s-contact','s-sales','s-project','s-from','s-to']
    .forEach(id => { const el = document.getElementById(id); if(el) el.value = ''; });
  applyFilter();
}

// 키워드 하이라이트
function hl(text, kw) {
  if (!kw || !text) return text || '-';
  const escaped = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return String(text).replace(new RegExp(`(${escaped})`, 'gi'),
    '<mark class="highlight">$1</mark>');
}

// 현재 렌더된 데이터 캐시 (인덱스로 접근하기 위해)
let _renderedData = [];

function openPdfByIdx(idx) {
  const r = _renderedData[idx];
  if (r && r.pdf_path) openPdfViewer(r.pdf_path, r.docnum || '');
}

function renderHistory(data) {
  _renderedData = data;
  const el = document.getElementById('hist-content');
  const countEl = document.getElementById('s-count');
  const total_q = _histAllData.length;

  if (countEl) {
    countEl.textContent = data.length < total_q
      ? `${data.length} / ${total_q}건`
      : `총 ${total_q}건`;
  }

  if (!data.length) {
    el.innerHTML = '<div class="hist-empty">' +
      (total_q ? '검색 결과가 없습니다.' : '아직 발행된 견적서가 없습니다.') +
      '</div>';
    return;
  }

  // 검색어 (하이라이트용)
  const kDocnum  = (document.getElementById('s-docnum')?.value  || '').trim();
  const kClient  = (document.getElementById('s-client')?.value  || '').trim();
  const kContact = (document.getElementById('s-contact')?.value || '').trim();
  const kSales   = (document.getElementById('s-sales')?.value   || '').trim();
  const kProject = (document.getElementById('s-project')?.value || '').trim();

  const rows = data.map((r, idx) => {
    const dt = new Date(r.created_at);
    const dateStr = dt.toLocaleDateString('ko-KR') + ' ' +
      dt.toLocaleTimeString('ko-KR', {hour:'2-digit', minute:'2-digit'});
    const totalStr = r.total ? Number(r.total).toLocaleString('ko-KR') + ' 원' : '-';
    const hasP = !!r.pdf_path;
    // PDF URL과 docnum을 전역 캐시 인덱스로 전달 (따옴표 충돌 완전 회피)
    const viewBtn = hasP
      ? `<button onclick="event.stopPropagation();openPdfByIdx(${idx})" style="background:#EFF6FF;color:#2563EB;border:none;border-radius:5px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit;margin-right:4px">미리보기</button>`
      : '';
    return `<tr style="cursor:default">
      <td>${dateStr}</td>
      <td>${hl(r.docnum,  kDocnum)}</td>
      <td>${hl(r.client,  kClient)}</td>
      <td>${hl(r.project, kProject)}</td>
      <td>${hl(r.sales,   kSales)}</td>
      <td class="badge-total">${totalStr}</td>
      <td style="white-space:nowrap">
        ${viewBtn}
        <button onclick="deleteHistory(${r.id})" style="background:#FEF2F2;color:#DC2626;border:none;border-radius:5px;padding:4px 10px;font-size:12px;cursor:pointer;font-family:inherit">삭제</button>
      </td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <table class="hist-table">
      <thead><tr>
        <th>발행일시</th><th>문서번호</th><th>고객사</th>
        <th>프로젝트</th><th>담당영업</th><th>합계금액</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (msg ? ' show' : '') + (type ? ' '+type : '');
  clearTimeout(t._tid);
  if (msg) t._tid = setTimeout(() => t.className = 'toast', 3500);
}
